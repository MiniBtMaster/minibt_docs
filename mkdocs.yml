site_name: MiniBT 量化交易知识库
site_url: https://minibt.com/
site_description: 专注于MiniBT量化交易框架的使用教程、策略开发和指标解析
site_author: MiniBT 团队

theme:
  name: material  # 推荐使用 material 主题
  features:
    - navigation.tabs
    - navigation.expand  # 允许导航项展开/收起
    - navigation.sections
    - navigation.path
    - search.suggest
    - search.highlight
    - content.tabs
  palette:
    primary: blue
    accent: indigo
  language: zh

plugins:
  - search
  - autorefs

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
    
# 添加自定义 CSS 和 JavaScript
extra_css:
  - css/custom.css
  # - https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css  # 添加 Font Awesome

extra_javascript:
  - js/back-to-top.js

nav:
  - 首页: index.md
  
  - MiniBT 量化交易基本使用:
    - 1.0 教程总览: minibt_basic/1.0minibt_quant_trading_series_tutorial.md
    - 1.1 简介: minibt_basic/1.1minibt_intro.md
    - 1.2 安装教程: minibt_basic/1.2minibt_install.md
    - 1.3 入门实战: minibt_basic/1.3minibt_double_moving_average_strategy.md
    - 1.4 极速启动策略: minibt_basic/1.4minibt_fast_start_strategy.md
    - 1.5 参数优化教程: minibt_basic/1.5minibt_strategy_param_optimization.md
    - 1.6 数据获取指南: minibt_basic/1.6minibt_strategy_data_retrieval.md
    - 1.7 B类介绍: minibt_basic/1.7minibt_bt_class_intro.md
    - 1.8 策略类指南: minibt_basic/1.8minibt_strategy_class_guide.md
    - 1.9 指标基类指南: minibt_basic/1.9minibt_indicatorsbase_class_guide.md
    - 1.10 dataframe类指南: minibt_basic/1.10minibt_internal_data_dataframe_guide.md
    - 1.11 BtData类指南: minibt_basic/1.11minibt_internal_data_btdata_guide.md
    - 1.12 series类指南: minibt_basic/1.12minibt_internal_data_series_guide.md
    - 1.13 Line类指南: minibt_basic/1.13minibt_internal_data_line_guide.md
    - 1.14 BtIndicator类指南: minibt_basic/1.14minibt_btindicator_class_guide.md
  
  - MiniBT 量化交易策略:
    - 2.1Aberration（布林线突破）策略: minibt_strategies/2.1_aberration_breakout_strategy.md
    # - 动量策略:
    #     - 1. 动量策略基础: minibt_strategies/2.1_aberration_breakout_strategy1.md
